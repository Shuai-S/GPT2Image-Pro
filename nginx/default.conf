# 多 app 子域名反代配置
# SSL 由外部负载均衡器（Cloudflare 或 Certbot）处理
#
# 架构：单容器内 PM2 启动 4 个 Next.js 进程，Nginx 按 Host header 反代到对应端口。
# 容器内部通信走 127.0.0.1，无需跨容器网络。

# ---------- P2-7: 速率限制 ----------
# api 区域：面向外部 API 请求，允许每秒 30 次，突发 50
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
# auth 区域：认证端点严格限流，每分钟 5 次，防暴力破解
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;
# general 区域：普通页面请求，每秒 20 次
limit_req_zone $binary_remote_addr zone=general:10m rate=20r/s;

upstream web {
    server 127.0.0.1:3000;
}

upstream admin {
    server 127.0.0.1:3001;
}

upstream api {
    server 127.0.0.1:3002;
}

upstream platform {
    server 127.0.0.1:3003;
}

# ---------- P2-8: HTTP 到 HTTPS 重定向 ----------
# ---------- P2-10: 默认服务器（未匹配主机名） ----------
# 所有未匹配已知域名的 HTTP 请求统一 301 跳转 HTTPS
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

# P2-10: 443 端口默认服务器，拒绝未知主机名的直连请求
# 返回 444 立即关闭连接，不暴露任何服务信息
server {
    listen 443 default_server;
    server_name _;
    ssl_reject_handshake on;
    return 444;
}

# 用户前台
server {
    listen 80;
    server_name app.gpt2image.pro;

    location / {
        proxy_pass http://web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 大文件上传支持（PSD 导出等）
        client_max_body_size 200m;

        # P2-7: 通用速率限制
        limit_req zone=general burst=40 nodelay;

        # P2-6: 安全响应头
        # 防止页面被嵌入 iframe（点击劫持防护）
        add_header X-Frame-Options "SAMEORIGIN" always;
        # 禁止浏览器猜测 MIME 类型（防 MIME 嗅探攻击）
        add_header X-Content-Type-Options "nosniff" always;
        # 控制 Referer 头泄露范围
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # 禁用不必要的浏览器 API（摄像头、麦克风、地理位置）
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        # HSTS：强制浏览器后续请求使用 HTTPS，包含子域名
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# 管理后台
server {
    listen 80;
    server_name admin.gpt2image.pro;

    # P2-7: 认证端点严格限流，防暴力破解
    location /api/auth/ {
        limit_req zone=auth burst=3 nodelay;

        # 生产环境应限制管理后台访问 IP
        # TODO: 部署时取消注释以启用 IP 白名单
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;

        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # P2-6: 安全响应头（管理后台使用 DENY 禁止任何 iframe 嵌入）
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }

    location / {
        # 生产环境应限制管理后台访问 IP
        # TODO: 部署时取消注释以启用 IP 白名单
        # allow 10.0.0.0/8;
        # allow 172.16.0.0/12;
        # deny all;

        proxy_pass http://admin;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # P2-7: 通用速率限制
        limit_req zone=general burst=40 nodelay;

        # P2-6: 安全响应头（管理后台使用 DENY 禁止任何 iframe 嵌入）
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# API
server {
    listen 80;
    server_name api.gpt2image.pro;

    location / {
        proxy_pass http://api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # API 请求体限制
        client_max_body_size 50m;

        # P2-7: API 速率限制
        limit_req zone=api burst=50 nodelay;

        # P2-6: 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}

# 营销/文档站（同时接收裸域名和 www）
server {
    listen 80;
    server_name platform.gpt2image.pro gpt2image.pro www.gpt2image.pro;

    location / {
        proxy_pass http://platform;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # P2-7: 通用速率限制
        limit_req zone=general burst=40 nodelay;

        # P2-6: 安全响应头
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    }
}
