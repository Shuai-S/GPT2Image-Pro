moemail:
  base_url: "https://your-mail-api.example"
  api_key: "<moemail-api-key>"
  domains:
    - "example.com"
  expiry_time: 3600000

tempmail:
  base_url: "https://your-temp-mail-api.example"
  api_key: "<tempmail-api-key>"
  domain: "example.com"

register:
  email_provider: "moemail"
  mail_file: "mail.txt"
  mail_state_file: "mail_state.txt"
  proxy: "http://127.0.0.1:7890"
  otp_timeout: 120
  client_version: "<chatgpt-web-client-version>"
  client_build_number: "<chatgpt-web-client-build-number>"
  skip_oauth: true

cpa:
  enabled: false
  trigger: "register_success"
  url: "https://your-cpa-endpoint.example"
  password: "<cpa-password>"
  package: ""

panel:
  enabled: false
  base_url: "https://your-sub2api-or-panel.example"
  bearer_token: "<panel-bearer-token>"
  plan_type: "free"
  proxy: ""
  remark: ""
