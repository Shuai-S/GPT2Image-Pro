name: Docker Image CI

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY_GHCR: ghcr.io

concurrency:
  group: docker-${{ github.ref }}
  # 发布流程进入 manifest promote 后不可被同 ref 的重跑中断，否则可能只更新部分镜像。
  cancel-in-progress: false

jobs:
  quality-gate:
    name: Verify release source
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: GPT2IMAGE
      NEXT_PUBLIC_PAYMENT_PROVIDER: none
      NEXT_PUBLIC_GENERATIONS_BUCKET_NAME: generations
      NEXT_PUBLIC_AVATARS_BUCKET_NAME: avatars
      DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/gpt2image
      BETTER_AUTH_SECRET: build-time-placeholder-secret-not-for-runtime
      BETTER_AUTH_URL: http://localhost:3000
      GPT2IMAGE_SKIP_RUNTIME_SETTINGS_DB: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA；dependabot 维护）

      - name: Verify atomic release promotion
        shell: bash
        run: |
          bash -n scripts/promote-docker-release.sh
          bash -n scripts/promote-docker-release.test.sh
          bash scripts/promote-docker-release.test.sh

      - uses: ./.github/actions/setup

      - name: Generate Fumadocs source
        run: pnpm --filter @repo/web exec fumadocs-mdx

      - name: Lint
        run: pnpm turbo lint --force

      - name: Typecheck
        run: pnpm turbo typecheck --force

      - name: Unit tests
        run: pnpm turbo test --force

      - name: Build web
        run: pnpm turbo build --filter=@repo/web --force

  build-and-push:
    name: Build and push ${{ matrix.name }}
    runs-on: ubuntu-latest
    needs: quality-gate
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: web
            image: gpt2image-pro-web
            dockerfile: Dockerfile.web
            target: runner
            release_platforms: linux/amd64,linux/arm64
          - name: migrate
            image: gpt2image-pro-migrate
            dockerfile: Dockerfile.web
            target: migrator
            release_platforms: linux/amd64,linux/arm64
          - name: chatgpt-web-proxy
            image: gpt2image-pro-chatgpt-web-proxy
            dockerfile: Dockerfile.chatgpt-web-proxy
            target: runner
            release_platforms: linux/amd64,linux/arm64
          - name: chatgpt-register
            image: gpt2image-pro-chatgpt-register
            dockerfile: Dockerfile.chatgpt-register
            target: runner
            # Wine 注册机依赖 x86/amd64 运行时；避免 arm64 发布构建在 Wine 仓库阶段失败。
            release_platforms: linux/amd64

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA；dependabot 维护）

      - name: Set up QEMU
        if: startsWith(github.ref, 'refs/tags/v') && contains(matrix.release_platforms, 'linux/arm64')
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3（钉 SHA；dependabot 维护）

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Prepare GHCR namespace
        id: image
        shell: bash
        run: |
          echo "namespace=${REGISTRY_GHCR}/${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Extract metadata for GHCR
        id: meta-ghcr
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ steps.image.outputs.namespace }}/${{ matrix.image }}
          flavor: |
            latest=false
          tags: |
            type=raw,value=sha-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push to GHCR
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: ${{ startsWith(github.ref, 'refs/tags/v') && matrix.release_platforms || 'linux/amd64' }}
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_APP_NAME=GPT2IMAGE
            NEXT_PUBLIC_PAYMENT_PROVIDER=none
            NEXT_PUBLIC_GENERATIONS_BUCKET_NAME=generations
            NEXT_PUBLIC_AVATARS_BUCKET_NAME=avatars
            NEXT_PUBLIC_ASSET_PREFIX=
            NEXT_PUBLIC_GA_ID=
            NEXT_PUBLIC_SENTRY_DSN=
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

  promote:
    name: Promote release manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
    concurrency:
      # 所有版本串行移动 release descriptor channel，避免旧流程后完成并回退指针。
      group: docker-promote-${{ github.repository }}
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA；dependabot 维护）

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ${{ env.REGISTRY_GHCR }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and promote release manifests
        shell: bash
        env:
          IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
          SOURCE_TAG: sha-${{ github.sha }}-${{ github.run_id }}-${{ github.run_attempt }}
        run: ./scripts/promote-docker-release.sh

  release:
    runs-on: ubuntu-latest
    needs: promote
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA；dependabot 维护）

      - name: Prepare compose bundle
        shell: bash
        run: |
          mkdir -p dist
          cp docker-compose.yml docker-compose.build.yml .env.docker.example README.md dist/
          release_namespace="${REGISTRY_GHCR}/${GITHUB_REPOSITORY_OWNER,,}"
          sed -i \
            -e "s|^GPT2IMAGE_IMAGE_NAMESPACE=.*|GPT2IMAGE_IMAGE_NAMESPACE=${release_namespace}|" \
            -e "s|^GPT2IMAGE_IMAGE_TAG=.*|GPT2IMAGE_IMAGE_TAG=${GITHUB_REF_NAME}|" \
            dist/.env.docker.example
          tar -czf gpt2image-pro-${GITHUB_REF_NAME}.compose.tar.gz -C dist .
          zip -r gpt2image-pro-${GITHUB_REF_NAME}.compose.zip dist

      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            gpt2image-pro-${{ github.ref_name }}.compose.tar.gz
            gpt2image-pro-${{ github.ref_name }}.compose.zip
