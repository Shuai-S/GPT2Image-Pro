# ─────────────────────────────────────────────────────────────────────────────
# CI 流水线（持续集成）
#
# 目的：在代码合入前对「协作者 / PR 贡献者」的提交做强制门禁，落实 CLAUDE.md/AGENTS.md
#       第 0 章的协作准则 —— 文档镜像一致、代码风格、类型安全、测试、可构建、容器可打包。
#
# 触发：
#   - pull_request → main：贡献者门禁的主战场（每个 check 都会显示在 PR 上）。
#   - push        → main：合入后回归，保证主干始终绿色。
#   - 手动 (workflow_dispatch)：需要时人工重跑。
#
# 设计原则：
#   - 每个关注点拆成独立 job，PR 的 Checks 面板上一目了然，便于设为「必须通过(required)」。
#   - 风格检查只针对「本次改动的文件」(biome --changed)，既约束新代码，又不强迫为历史
#     遗留格式问题做一次性全仓重排（仓库当前未全量 biome 格式化，全量 ci 会误伤）。
#   - 类型检查 / 测试为全仓门禁（仓库当前已全绿，可硬性强制）。
# ─────────────────────────────────────────────────────────────────────────────
name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

# 同一分支/PR 的新提交会取消仍在跑的旧流水线，节省额度、加快反馈。
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# 最小权限：CI 只读仓库内容；不授予写权限（发布交给 docker-release.yml）。
permissions:
  contents: read

jobs:
  # ───────────────────────────────────────────────────────────────────────────
  # 1) 文档镜像一致性：CLAUDE.md 必须与 AGENTS.md 逐字相同。
  #    这是 CLAUDE.md/AGENTS.md 自身定下的「镜像文件」约束的自动化执法点。
  #    极轻量：无需安装依赖，秒级失败。
  # ───────────────────────────────────────────────────────────────────────────
  docs-mirror:
    name: Docs mirror (CLAUDE == AGENTS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
      - name: Assert CLAUDE.md and AGENTS.md are identical
        run: |
          # diff -q 仅在内容不同时返回非零；--strip-trailing-cr 容忍 CRLF/LF 差异，
          # 避免因 Windows 贡献者的换行符导致误报。
          if ! diff -q --strip-trailing-cr CLAUDE.md AGENTS.md > /dev/null; then
            echo "::error::CLAUDE.md 与 AGENTS.md 内容必须完全一致（镜像文件）。请同步两者后再提交。"
            echo "----- 差异如下 -----"
            diff --strip-trailing-cr CLAUDE.md AGENTS.md || true
            exit 1
          fi
          echo "OK：CLAUDE.md 与 AGENTS.md 一致。"

  # ───────────────────────────────────────────────────────────────────────────
  # 2) 代码风格 / Lint（仅 PR、仅改动文件）：Biome 对本次 PR 触及的文件执行 lint。
  #
  #    设计取舍（均经验证，见 docs/CI-CD.md）：
  #    - 用 `biome lint`（仅 lint）而非 `biome ci`（lint + 格式 + import 排序）：
  #      本仓库历史代码从未做过全仓 biome 格式化（全仓 `biome ci` 有 300+ 格式报错），
  #      团队既有约定 `turbo lint` 即 `biome lint`。强制格式会误伤大量历史文件。
  #    - 仅在 `pull_request` 触发：贡献者门禁的精确位置是 PR，diff = PR 相对目标分支的净改动（小而准）。
  #      push（尤其合并提交）的改动集巨大，会把所触碰文件里的历史 lint 债一并暴露，造成无关失败。
  #      类型/测试/构建仍在 push+PR 双跑以保证主干常绿。
  lint:
    name: Lint & format (changed files)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      # fetch-depth: 0 拉取完整历史，否则 --since 的基准提交可能不在浅克隆里。
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      # PR 场景的 diff 基准即目标分支的 base.sha（GitHub 保证存在且可达）。
      - name: Resolve diff base
        id: base
        run: echo "base=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"

      # 直接调用仓库锁定的 Biome 版本（apps/web 的依赖，2.3.11），cwd=仓库根，
      # 保证与开发者本地 `biome lint` 完全同款行为；--changed 仅查相对 base 改动的文件。
      # --no-errors-on-unmatched：纯文档类 PR（无 JS/TS 改动）不应判失败。
      # 退出码：有 lint 错误（如 noExplicitAny / noUnusedImports）即失败；
      #         告警级规则（如 noNonNullAssertion=warn）不阻断（与本地一致）。
      - name: Biome lint (changed files only)
        run: |
          ./apps/web/node_modules/.bin/biome lint \
            --changed --since="${{ steps.base.outputs.base }}" \
            --no-errors-on-unmatched \
            .

  # ───────────────────────────────────────────────────────────────────────────
  # 3) 类型检查（鲁棒性）：全仓 strict tsc --noEmit。
  # ───────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
      - uses: ./.github/actions/setup
      # 生成 Fumadocs 的 `.source`（.gitignore 忽略、由 createMDX 在 next build/dev 时产出）。
      # 独立 `tsc --noEmit` 不会触发该产出，缺失会导致 src/lib/source.ts 找不到 ../../.source/server，
      # 引发一连串隐式 any 报错。build 任务走 next build 会自生成，故仅 typecheck 需要这一步。
      - name: Generate Fumadocs source
        run: pnpm --filter @repo/web exec fumadocs-mdx
      - run: pnpm turbo typecheck

  # ───────────────────────────────────────────────────────────────────────────
  # 4) 单元测试（鲁棒性）：全仓 vitest（DB-free）。覆盖积分/扣费/幂等/API 等核心逻辑。
  # ───────────────────────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
      - uses: ./.github/actions/setup
      - run: pnpm turbo test

  # PostgreSQL 真实执行门禁：同时覆盖空库完整迁移与上一正式版带数据升级。
  # 单元测试保持 DB-free；迁移风险在独立数据库和独立 job 内隔离。
  database-migrations:
    name: PostgreSQL migrations
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: postgres
          POSTGRES_USER: gpt2image
          POSTGRES_PASSWORD: gpt2image
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U gpt2image -d postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: gpt2image
      PGPASSWORD: gpt2image
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
        with:
          fetch-depth: 0

      - uses: ./.github/actions/setup

      - name: Check migration journal consistency
        env:
          DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/postgres
        run: pnpm --dir packages/database exec drizzle-kit check --config drizzle.config.ts

      - name: Create migration test databases
        run: |
          createdb gpt2image_empty
          createdb gpt2image_upgrade

      - name: Run current migrations on an empty database
        env:
          DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/gpt2image_empty
        run: |
          pnpm --dir packages/database db:migrate
          pnpm --dir packages/database db:migrate

      - name: Resolve previous stable release
        id: previous-release
        shell: bash
        run: |
          set -Eeuo pipefail
          previous_tag="$({
            git tag --merged HEAD --list 'v[0-9]*.[0-9]*.[0-9]*' \
              --sort=-version:refname
          } | grep -E '^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$' | head -n 1)"
          if [[ -z "$previous_tag" ]]; then
            echo "::error::找不到可达的上一正式版本 tag"
            exit 1
          fi
          echo "tag=$previous_tag" >> "$GITHUB_OUTPUT"

      - name: Prepare previous release migration folder
        env:
          PREVIOUS_TAG: ${{ steps.previous-release.outputs.tag }}
        run: |
          mkdir -p "$RUNNER_TEMP/previous-release"
          git archive "$PREVIOUS_TAG" packages/database/drizzle | \
            tar -x -C "$RUNNER_TEMP/previous-release"

      - name: Create and seed previous release database
        env:
          DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/gpt2image_upgrade
        run: |
          node scripts/run-migrations-from-folder.mjs \
            "$RUNNER_TEMP/previous-release/packages/database/drizzle"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 \
            --file scripts/seed-previous-release-schema.sql

      - name: Upgrade previous release database
        env:
          DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/gpt2image_upgrade
        run: |
          pnpm --dir packages/database db:migrate
          pnpm --dir packages/database db:migrate

      - name: Assert migrated schemas
        shell: bash
        run: |
          set -Eeuo pipefail
          expected_migration_at="$(
            node -e '
              const journal = require("./packages/database/drizzle/meta/_journal.json");
              console.log(Math.max(...journal.entries.map((entry) => entry.when)));
            '
          )"
          for database in gpt2image_empty gpt2image_upgrade; do
            psql \
              --dbname "$database" \
              -v ON_ERROR_STOP=1 \
              -v expected_migration_at="$expected_migration_at" \
              --file scripts/assert-migrated-schema.sql
          done

  # ───────────────────────────────────────────────────────────────────────────
  # 6) 构建（鲁棒性）：next build（standalone）。Next 在 build 时会做整体类型与编译校验，
  #    能抓到仅在生产构建下暴露的问题。环境变量为占位值，与 Dockerfile.web 的 build-args 一致。
  #    注意：此处不设 NODE_ENV=production，否则 pnpm 可能跳过 devDependencies 导致构建失败。
  # ───────────────────────────────────────────────────────────────────────────
  build:
    name: Build web
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_APP_NAME: GPT2IMAGE
      NEXT_PUBLIC_PAYMENT_PROVIDER: none
      NEXT_PUBLIC_GENERATIONS_BUCKET_NAME: generations
      NEXT_PUBLIC_AVATARS_BUCKET_NAME: avatars
      # 仅供构建期模块加载使用的占位值（@repo/database 在 import 时会校验 DATABASE_URL）。
      # 绝非运行时机密 —— 真实机密只存在于部署环境（见 CLAUDE.md §0.5）。
      DATABASE_URL: postgresql://gpt2image:gpt2image@localhost:5432/gpt2image
      BETTER_AUTH_SECRET: build-time-placeholder-secret-not-for-runtime
      BETTER_AUTH_URL: http://localhost:3000
      # build job 不启动 PostgreSQL；公开 ISR 在构建期用 env/default，运行时再读 DB。
      GPT2IMAGE_SKIP_RUNTIME_SETTINGS_DB: "1"
      # Lighthouse 仅探测公开页面，不应启动需要数据库的后台循环。
      INTERNAL_JOB_SCHEDULER_ENABLED: "false"
      EXTERNAL_ASYNC_TASK_WORKERS_ENABLED: "false"
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
      - uses: ./.github/actions/setup
      - run: pnpm turbo build --filter=@repo/web
      - name: Enforce client asset budgets
        run: pnpm performance:assets
      - name: Enforce public page Lighthouse budgets
        uses: treosh/lighthouse-ci-action@3e7e23fb74242897f95c0ba9cabad3d0227b9b18 # v12
        with:
          configPath: ./lighthouserc.cjs

  # ───────────────────────────────────────────────────────────────────────────
  # 7) 容器构建校验（仅 PR）：用 Dockerfile.web 实打实构建 web 镜像但**不推送**，
  #    验证多阶段 Dockerfile（turbo prune → install → build → standalone 打包）未损坏。
  #    gha 缓存让重复构建保持快速。门禁在前 4 个 job 通过后才跑，避免无谓消耗。
  # ───────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker build (no push)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5（钉 SHA 防 tag 重指向；dependabot 维护）
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Build web image (validation only)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: Dockerfile.web
          target: runner
          push: false # 仅校验可构建性；推送由 tag 触发的 docker-release.yml 负责
          build-args: |
            NEXT_PUBLIC_APP_URL=http://localhost:3000
            NEXT_PUBLIC_APP_NAME=GPT2IMAGE
            NEXT_PUBLIC_PAYMENT_PROVIDER=none
            NEXT_PUBLIC_GENERATIONS_BUCKET_NAME=generations
            NEXT_PUBLIC_AVATARS_BUCKET_NAME=avatars
          cache-from: type=gha,scope=web-ci
          cache-to: type=gha,mode=max,scope=web-ci
