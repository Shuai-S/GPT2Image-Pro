name: gpt2image-pro

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-gpt2image}
      POSTGRES_USER: ${POSTGRES_USER:-gpt2image}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-gpt2image} -d ${POSTGRES_DB:-gpt2image}",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  migrate:
    image: ${GPT2IMAGE_IMAGE_NAMESPACE:-ghcr.io/meowfree}/gpt2image-pro-migrate:${GPT2IMAGE_IMAGE_TAG:-latest}
    env_file:
      - ${GPT2IMAGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpt2image}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gpt2image}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  web:
    image: ${GPT2IMAGE_IMAGE_NAMESPACE:-ghcr.io/meowfree}/gpt2image-pro-web:${GPT2IMAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    env_file:
      - ${GPT2IMAGE_ENV_FILE:-.env}
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-gpt2image}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-gpt2image}
      # 鉴权必填:未配置会导致所有人(含超管)登录失败,务必先在 env 文件中设置。
      # BETTER_AUTH_SECRET: 会话/Cookie 签名密钥(随机长字符串,如 `openssl rand -base64 32`)。
      # BETTER_AUTH_URL: 站点对外访问地址(如 https://your-domain),须与浏览器实际访问的域名一致,
      #   否则登录回调/Cookie 域不匹配,超管也进不去。
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET 必填:会话签名密钥,未设置将无法登录}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:?BETTER_AUTH_URL 必填:须为站点公网访问地址(如 https://your-domain),否则登录失败}
      LOCAL_STORAGE_PATH: /app/storage
      CHATGPT_WEB_PROXY_URL: http://chatgpt-web-proxy:3021
      CHATGPT_WEB_PROXY_SECRET: ${CHATGPT_WEB_PROXY_SECRET:-}
      # 注册机 sidecar：未设置 URL 时后台「注册机」Tab 不可用（直接报错），不影响其余功能。
      CHATGPT_REGISTER_URL: ${CHATGPT_REGISTER_URL:-http://chatgpt-register:3023}
      CHATGPT_REGISTER_SECRET: ${CHATGPT_REGISTER_SECRET:-}
      GPT2IMAGE_BOOTSTRAP_CREDENTIALS_PATH: /app/.gpt2image/super-admin-credentials.txt
    ports:
      - "${WEB_PORT:-3000}:3000"
    volumes:
      - app-storage:/app/storage
      - app-bootstrap:/app/.gpt2image
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      chatgpt-web-proxy:
        condition: service_started
      chatgpt-register:
        condition: service_started

  chatgpt-web-proxy:
    image: ${GPT2IMAGE_IMAGE_NAMESPACE:-ghcr.io/meowfree}/gpt2image-pro-chatgpt-web-proxy:${GPT2IMAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      CHATGPT_WEB_PROXY_BIND: :3021
      CHATGPT_WEB_PROXY_SECRET: ${CHATGPT_WEB_PROXY_SECRET:-}
      CHATGPT_WEB_PROXY_PROFILE: ${CHATGPT_WEB_PROXY_PROFILE:-chrome_146}
      CHATGPT_WEB_PROXY_TIMEOUT_SECONDS: ${CHATGPT_WEB_PROXY_TIMEOUT_SECONDS:-300}
      CHATGPT_WEB_PROXY_MAX_BODY_MB: ${CHATGPT_WEB_PROXY_MAX_BODY_MB:-64}
      CHATGPT_WEB_UPSTREAM_PROXY_URL: ${CHATGPT_WEB_UPSTREAM_PROXY_URL:-}

  # 注册机 sidecar：debian + wine 跑 ChatGPTRegister.exe。仅 web 经内网调用，
  # X-Register-Secret 鉴权；不持有 DB 凭据，token 入库由 web 完成。
  chatgpt-register:
    image: ${GPT2IMAGE_IMAGE_NAMESPACE:-ghcr.io/meowfree}/gpt2image-pro-chatgpt-register:${GPT2IMAGE_IMAGE_TAG:-latest}
    restart: unless-stopped
    environment:
      CHATGPT_REGISTER_BIND: :3023
      CHATGPT_REGISTER_SECRET: ${CHATGPT_REGISTER_SECRET:-}
      CHATGPT_REGISTER_TIMEOUT_SECONDS: ${CHATGPT_REGISTER_TIMEOUT_SECONDS:-1800}

volumes:
  postgres-data:
  app-storage:
  app-bootstrap:
